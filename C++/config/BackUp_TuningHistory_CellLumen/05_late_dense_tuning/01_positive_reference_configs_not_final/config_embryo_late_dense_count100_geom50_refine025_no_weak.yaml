# Late dense CellLumen tuning candidate.
# Combines stronger geometry weighted centers with lighter final local refine.
# This checks whether the default final refine is pulling centers back toward
# bright subregions in late noisy frames.
base_config: config_embryo_late_dense_minvox1000_count100.yaml

cell_lumen:
  geometricCenterBlend: 0.50
  finalWeakSatelliteFilterEnabled: false
  finalLocalRefineBlend: 0.25

