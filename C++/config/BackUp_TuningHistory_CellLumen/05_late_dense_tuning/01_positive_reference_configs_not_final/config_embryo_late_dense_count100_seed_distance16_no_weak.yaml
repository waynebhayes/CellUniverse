# Late dense CellLumen tuning candidate.
# Reduces the seeded watershed spacing to recover true neighboring cells in
# dense late frames. This targets persistent misses that no final filter change
# could recover.
base_config: ../01_positive_reference_configs_not_final/config_embryo_late_dense_minvox1000_count100.yaml

cell_lumen:
  seededWatershedMinSeedDistance: 16.0
  seededWatershedLowRescueMinSeedDistance: 16.0
  finalWeakSatelliteFilterEnabled: false

