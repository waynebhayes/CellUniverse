# This keeps the v005/v017 quality thresholds, but makes the second low rescue
# watershed pass place seeds closer together. The remaining misses are mostly
# dense neighbors near an already detected center, so the goal is to expose
# those close candidates without lowering signal quality into background noise.
base_config: ../../../C.elegans developing embryo/Best_until_now/config_cell_lumen_embryo_celluniverse_preprocess_high_recall.yaml

cell_lumen:
