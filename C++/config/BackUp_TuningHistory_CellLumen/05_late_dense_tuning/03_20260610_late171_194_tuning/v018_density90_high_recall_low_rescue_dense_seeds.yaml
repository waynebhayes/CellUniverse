  seededWatershedAdaptiveDenseMinVoxels: 800
  seededWatershedMaxSeeds: 1200
  seededWatershedLowRescueMinVoxels: 800
  seededWatershedLowRescueMinCandidateVoxels: 800
  seededWatershedLowRescueMinSeedDistance: 12.0
  seededWatershedLowRescueCloseSeedMinDistance: 6.0
  seededWatershedLowRescueMinValleyDrop: 0.0
  seededWatershedLowRescueClusterDistance: 12.0
  seededWatershedLowRescueMinDistance: 12.0
  seededWatershedLowRescueMinTop10MinusShell: 65.0
  seededWatershedLowRescueMaxAdded: 160
  seededWatershedLowRescueSortByDistance: false
  finalDuplicateMergeDistance: -1.0
