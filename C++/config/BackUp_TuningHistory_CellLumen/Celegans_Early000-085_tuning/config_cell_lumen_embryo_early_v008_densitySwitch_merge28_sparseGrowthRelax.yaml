base_config: ../../C.elegans developing embryo/Best_until_now/config_cell_lumen_embryo_standalone_clean.yaml

cell_lumen:
  seededWatershedEnabled: true
  seededWatershedPreferOverPercentile: false
  seededWatershedPreferBaseCountMin: 21
  seededWatershedPreferBaseCountMax: 10000
  seededWatershedLowRescueEnabled: false
  seededWatershedRescueEnabled: false
  finalWeakSatelliteFilterEnabled: true
  finalDuplicateMergeDistance: 28.0
  finalPostRefineDuplicateMergeDistance: 28.0

  # The middle and late clean profile protects dense frames by heavily
  # penalizing candidate counts that grow from the first percentile sweep.
  # Early sparse frames can legitimately add one or two daughters after a
  # division, so this profile allows moderate sparse growth before calling it
  # over segmentation.
  maxCandidateCountGrowthFromFirst: 1.45
  candidateOvergrowthPenaltyWeight: 120.0
  candidateCellCountWeight: 0.55
