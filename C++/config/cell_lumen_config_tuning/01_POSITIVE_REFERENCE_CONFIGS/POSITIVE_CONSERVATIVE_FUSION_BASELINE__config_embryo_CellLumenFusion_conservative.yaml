base_config: ../../C.elegans developing embryo/Best_until_now/config_embryo_NoPreprocess.yaml

# Conservative CellLumen plus Cell Universe fusion for embryo raw intensity runs.
#
# This config keeps CellLumen as a high recall prior, not as final truth. Raw
# voxel intensity is preserved by config_embryo_NoPreprocess.yaml, and CellLumen
# only supplies nearby center/radius hints plus carefully gated rescue cells
# before the normal Cell Universe optimizer runs.

cell_lumen:
  enabled: true
  fusionEnabled: true

  # High recall mode for fusion. Do not merge away nearby CellLumen candidates
  # before Cell Universe sees them; the optimizer can reject duplicates later,
  # but it cannot recover a true cell if the prior removed it too early.
  finalDuplicateMergeDistance: -1.0
  finalPostRefineDuplicateMergeDistance: -1.0
  finalWeakSatelliteFilterEnabled: false

  # Existing cells get a small center/radius nudge from nearby CellLumen centers.
  # This is the safest first integration step: it cannot create a new lineage
  # branch by itself, and the normal optimizer still decides the final shape.
  fusionCenterPriorEnabled: true
  fusionCenterPriorMaxDistance: 24.0
  fusionCenterPriorPositionBlend: 0.35
  fusionCenterPriorRadiusBlend: 0.25

  # New rescue cells are still gated by biological size, local shell contrast,
  # and distance from all existing cells. Keep the per-frame cap modest so an
  # over-detected CellLumen frame cannot flood Cell Universe with false cells.
  fusionMinDistanceToExisting: 24.0
  fusionMinVoxels: 1000
  fusionMinTop10MinusShell: 65.0
  fusionMaxAddedPerFrame: 12
  fusionRepairCloseCellsEnabled: true
  fusionRepairMaxDistance: 18.0
  fusionRepairRadiusRatio: 0.75
  fusionRepairPositionBlend: 0.20
  fusionRepairRadiusBlend: 0.75
