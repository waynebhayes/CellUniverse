cellType: spheroid

# Cell settings — perturbation parameters for each dimension
cell:
  x:
    increase_prob: 0.45
    decrease_prob: 0.45
    mu: 0
    sigma: 5
  y:
    increase_prob: 0.45
    decrease_prob: 0.45
    mu: 0
    sigma: 5
  z:
    increase_prob: 0.35
    decrease_prob: 0.35
    mu: 0
    sigma: 8
  majorRadius:
    increase_prob: 0.85
    decrease_prob: 0.4
    mu: 0
    sigma: 2
  minorRadius:
    increase_prob: 0.3
    decrease_prob: 0.85
    mu: 0
    sigma: 2
  thetaX:
    increase_prob: 0.9
    decrease_prob: 0.9
    mu: 0
    sigma: 0.1
  thetaY:
    increase_prob: 0.9
    decrease_prob: 0.9
    mu: 0
    sigma: 0.1
  thetaZ:
    increase_prob: 0.8
    decrease_prob: 0.8
    mu: 0
    sigma: 0.1
  brightness:
    increase_prob: 0.0  # not perturbed — fixed from initial measurement
    decrease_prob: 0.0
    mu: 0
    sigma: 0.0
  minMajorRadius: 10
  maxMajorRadius: 40
  minMinorRadius: 5
  maxMinorRadius: 35


  
  minBrightness: 0.1
  maxBrightness: 0.98
  brightnessUpdateBlend: 0.8
  brightnessMeanAmplification: 1.2
  volumeRecoveryLossFractionThreshold: 0.2
  volumeRecoveryMaxScaleIncreaseFraction: 0.6
  flatCellRotationRefineFlatnessThreshold: 0.8
  flatCellRotationRefineAngleStep: 0.15
  flatCellRotationRefineMaxOffsetDegrees: 15.0
  flatCellRotationRefinePasses: 2



  splitBrightestFraction: 0.055

# Simulation settings
simulation:
  iterations_per_cell: 350
  background_color: 0.0  # post-sigmoid background is near 0
  cell_color: 1.0       # post-sigmoid cells are near 1
  z_scaling: 7
  blur_sigma: 10.0  # heavy blur before sigmoid (matches working 0303 run)
  sigmoid_k: 75.0
  sigmoid_center: 0.445
  sigmoid_center_percentile: 0.45
  post_sigmoid_dimmest_percentile: 0.995
  post_sigmoid_dimmest_transition_width: 0.2
  post_sigmoid_dimmest_transition_gradient: 0.6
  adaptive_background_expand_factor: 1.1
  adaptive_background_top_fraction: 0.4
  sigmoid_center_offset: 0.047
  calibration_x: 20
  calibration_y: 20
  calibration_z: 0
  calibration_width: 50
  calibration_height: 31

# Probability of changes
prob:
  split: 0.03
  split_cost: 20
  split_elongation_threshold: 1.1
  overlap_penalty_weight: 500.0
  size_reduction_penalty_weight: 0.0
  split_fake_overlap_volume_fraction_threshold: 0.15
  split_fake_volume_ratio_threshold: 6.0
  split_search_radius_multiplier: 3.0
  split_minor_axis_alignment_tolerance_degrees: 150.0
  split_minor_axis_alignment_flatness_ratio_threshold: 0.5
  split_minor_axis_alignment_min_radius_disable_threshold: 5.0
  split_fake_bridge_brightness_similarity_threshold: 0.99
  split_pre_burn_in_min_separation_over_major: 0.35
  split_pre_burn_in_z_axis_max_abs: 0.92
  split_pre_burn_in_z_axis_max_separation_over_major: 1.3
  split_pre_burn_in_z_axis_min_drift_over_major: 0.4
  split_post_burn_in_large_recenter_min_drift_over_major: 0.85
  split_post_burn_in_large_recenter_max_cost_diff: -40.0
  split_burn_in_iterations: 1000
  max_split_probability: 0.2
