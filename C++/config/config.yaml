cellType: ellipsoid

# Position + rotation perturbation only.
# Radii are fit by iterative PCA on bright pixels each frame, so
# radius perturbation params are not read here.
cell:
  x:
    increase_prob: 0.45
    decrease_prob: 0.45
    mu: 0
    sigma: 5
  y:
    increase_prob: 0.45
    decrease_prob: 0.45
    mu: 0
    sigma: 5
  z:
    increase_prob: 0.35
    decrease_prob: 0.35
    mu: 0
    sigma: 8
  thetaX:
    increase_prob: 0.7
    decrease_prob: 0.7
    mu: 0
    sigma: 0.05
  thetaY:
    increase_prob: 0.7
    decrease_prob: 0.7
    mu: 0
    sigma: 0.05
  thetaZ:
    increase_prob: 0.7
    decrease_prob: 0.7
    mu: 0
    sigma: 0.05

  minARadius: 10
  maxARadius: 65
  minBRadius: 10
  maxBRadius: 65
  minCRadius: 10
  maxCRadius: 65

  initialRadiusScale: 1.0
  initialBrightness: 0.22
  backgroundColor: 0.05

  minBrightness: 0.1
  maxBrightness: 0.98

  brightnessProbabilityStep: 0.02
  brightnessProbabilityTrust: 0.3

  brightnessUpdateBlend: 0.95
  brightnessMeanAmplification: 1.1
  brightnessMeasurementTopPercentile: 0.3

  # Iterative PCA shape fit (per frame, before perturbation loop).
  # Converges rotation + radii (+ centroid) to the Voronoi-filtered
  # bright cloud inside maskScale * current ellipsoid. See
  # Frame::calibrateCellShapeViaPca.
  pcaShapeMaxIters: 15
  pcaShapeRadiusScale: 2.236       # sqrt(5): uniform-ellipsoid variance
  pcaShapeMinPixels: 50
  pcaShapeMaskScale: 1.3
  pcaShapeConvergeRadius: 0.3
  pcaShapeConvergeAngleDeg: 2.0
  pcaShapeUpdatePosition: true
  pcaShapeMaxPosShiftFraction: 0.5

# Image preprocessing pipeline — iterative contrast enhancer ported from
# scripts/image_processor_clean.py. No sigmoid.
simulation:
  iterations_per_cell: 500
  z_scaling: 7
  blur_sigma: 0.0

  iterative_penalty: 0.1
  iterative_min_penalty: 0.005
  iterative_collapse_backoff: 0.99
  iterative_penalty_range: 0.9
  iterative_reward_gate: 1.0
  iterative_reward_gate_decrement: 0.008
  iterative_reward_gate_min: 0.025
  iterative_reward: 0.1
  iterative_score_max: 0.5
  iterative_max_count: 300
  iterative_no_improvement_patience: 10
  iterative_improvement_tolerance: 0.01
  iterative_score_drop_stop_threshold: 0.1
  iterative_score_percentile: 0.05
  iterative_score_percentile_max: 0.90
  iterative_score_percentile_increment: 0.025

  contrast_structure_threshold: 0.02
  contrast_eps: 0.000001

  post_process_blur_sigma: 2.5
  post_process_amplification: 2.5
  post_process_black_percentile: 0.1
  post_process_white_percentile: 0.5

  michelson_low_percentile: 0.10
  michelson_high_percentile: 0.90
  michelson_eps: 0.000001

  weber_background_percentile: 0.10
  weber_signal_percentile: 0.90
  weber_background_floor: 0.0039215686
  weber_eps: 0.000001

  export_preprocessed_images: false
  quit_after_preprocessing: false

  adaptive_background_expand_factor: 1.1
  adaptive_background_top_fraction: 0.4

  # Asymmetric L2 cost weight (Fix E). Per-voxel squared error is multiplied
  # by this factor when synth > real (cell covers dark image region).
  # 1.0 = symmetric L2 (disabled). Makes "parent covering dark valley
  # between two daughters" reliably cost more than "two daughters covering
  # bright blobs." Raised from 3.0 to 6.0 on 2026-04-14 — at k=3 the
  # true-split costDiff for e9077 f3 was only +5 to +15 (still rejected).
  # Stronger amplification needed to overcome correctly-shape-fit parent
  # baselines. Raised 6.0 → 8.0 on 2026-04-14 (evening) — true-split
  # costDiff was -15 to -23 (dangerous zone vs -15.5 false splits).
  # k=8 amplifies parent-valley-overshoot and phantom-in-dark penalties
  # by 33%, widening the discrimination between true and phantom splits.
  asymmetric_cost_weight: 8.0

# Triaxial split detection pipeline.
prob:
  # P(split) ramps linearly from P_split_base at snap elong=1.0 to
  # P_split_max at snap elong=2.0 (clamped above). No classification
  # threshold — every cell has at least P_split_base chance per iter,
  # elongated cells get progressively higher.
  P_split_base: 0.03
  P_split_max: 0.5

  split_cost: 15
  overlap_penalty_weight: 500.0

  expected_daughter_pre_pass_iterations: 1

  split_candidates_per_attempt: 30
  split_candidate_burn_in_iterations: 50
  split_final_refine_iterations: 30
  split_calibration_iterations_per_cell: 50
  split_candidate_rotation_delta_degrees: 8
  split_candidate_translation_delta_fraction: 0.2

  bio_daughter_size_ratio_max: 1.5
  bio_combined_volume_min_fraction: 0.6
  bio_combined_volume_max_fraction: 1.3
  bio_max_single_daughter_volume_fraction: 0.65
  bio_bridge_max_gap_density: 0.18
  bio_bridge_max_valley_ratio: 0.85

  split_burn_in_pos_sigma_scale: 0.4

  # A1: after positional refine, re-fit each daughter's radii via PCA on
  # its Voronoi-claimed pixel cloud. Tightens real daughters (lower cost)
  # while phantom daughters in empty space hit the floor and gain nothing.
  # Clamps to split_daughter_refit_min_radius_fraction * built_radii to
  # prevent collapsed-sliver regressions. Set iterations=0 to disable.
  split_daughter_refit_iterations: 3
  split_daughter_refit_min_radius_fraction: 0.6
