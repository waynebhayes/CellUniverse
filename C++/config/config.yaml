cellType: spheroid

# Cell settings — perturbation parameters for each dimension
cell:
  x:
    prob: 0.45
    mu: 0
    sigma: 5
  y:
    prob: 0.45
    mu: 0
    sigma: 5
  z:
    prob: 0.35
    mu: 0
    sigma: 8
  majorRadius:
    prob: 0.2
    mu: 0
    sigma: 2
  minorRadius:
    prob: 0.2
    mu: 0
    sigma: 2
  thetaX:
    prob: 0.3
    mu: 0
    sigma: 0.1
  thetaY:
    prob: 0.3
    mu: 0
    sigma: 0.1
  thetaZ:
    prob: 0.3
    mu: 0
    sigma: 0.1
  brightness:
    prob: 0  # not perturbed — fixed from initial measurement
    mu: 0
    sigma: 0
  minMajorRadius: 10
  maxMajorRadius: 40
  minMinorRadius: 5
  maxMinorRadius: 35


  # not involved in calculation 
  minBrightness: 0.1
  maxBrightness: 0.95
  brightnessUpdateBlend: 0.8
  # end  


  splitBrightestFraction: 0.4

# Simulation settings
simulation:
  iterations_per_cell: 350
  background_color: 0.25  # post-sigmoid background is near 0
  cell_color: 0.5       # post-sigmoid cells are near 1
  z_scaling: 7
  blur_sigma: 10.0  # heavy blur before sigmoid (matches working 0303 run)
  sigmoid_k: 85.0
  sigmoid_center: 0.445
  sigmoid_center_percentile: 0.45
  post_sigmoid_dimmest_percentile: 0.5
  adaptive_background_expand_factor: 1.1
  adaptive_background_top_fraction: 0.35
  sigmoid_center_offset: 0.047
  calibration_x: 20
  calibration_y: 20
  calibration_z: 0
  calibration_width: 50
  calibration_height: 31

# Probability of changes
prob:
  split: 0.03
  split_cost: 15
  split_elongation_threshold: 1.1
  overlap_penalty_weight: 100.0
  size_reduction_penalty_weight: 0.1
  split_burn_in_iterations: 500
  max_split_probability: 0.45
