    min_median_nearest_neighbor_px: 31.681759
    max_median_nearest_neighbor_px: 42.373837
    note: Previously verified deterministic split profile.
  - frames: 170-171
    cell_count_range: 299-306
    median_nearest_neighbor_px: 31.447258
    note: Very dense late boundary signal.
