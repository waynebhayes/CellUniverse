  default_profile: F001_084_cell_lumen_v107_density_guarded_no_miss
  important_runtime_note: C++ selects profiles from current algorithm cell centers using median nearest-neighbor distance.
    GT is only for offline validation and is never used by this YAML.
  density_boundary_observations:
  - frames: 001-084
    cell_count_range: 4-55
    median_nearest_neighbor_px: 80.63288
    min_median_nearest_neighbor_px: 58.090416
    note: Early sparse stage. Use v107 density-guarded Cell Lumen logic. Boundary kept above f085 so f084 stays early and f085
      switches middle.
