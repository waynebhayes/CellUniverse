  - profile: F001_084_cell_lumen_v107_density_guarded_no_miss
    min_frame: 0
    max_frame: 84
    min_live_cells: 0
    max_live_cells: 84
    min_median_nearest_neighbor_px: -1000000000.0
    max_median_nearest_neighbor_px: 1000000000.0
