  implementation_notes:
  - Early profile sets fusionSplitPriorTreatInitialCellsAsNew=true so initial.csv cells obey the configured parent-age split
    guard; verified later profiles keep false.
  - Runtime switching now supports explicit frame and live-cell guards because median nearest-neighbor alone can misclassify
    sparse early daughter pairs as middle density immediately after a split.
  - Early profile enables fusionCenterPriorClusterCollapse so several internal Cell Lumen peaks inside one sparse large parent become one
    weighted center prior; verified later profiles keep this switch false.
  - Early profile enables the early large-separation split rescue with a parent-shape guard so the first two real divisions can
    be selected even when their cost is positive; later profiles keep this switch false.
