    min_frame: 85
    max_frame: 120
    min_live_cells: 56
    max_live_cells: 138
    min_median_nearest_neighbor_px: 43.0
    max_median_nearest_neighbor_px: 56.0
    note: Middle sparse profile verified on frames 085-120.
  - profile: F121_170_deterministic_split_verified
    min_frame: 121
    max_frame: 170
    min_live_cells: 120
    max_live_cells: 320
    min_median_nearest_neighbor_px: 34.0
    max_median_nearest_neighbor_px: 43.0
    note: Late dense profile verified on frames 121-170.
  - profile: F170_174_late_baseline_verified
    min_frame: 170
    max_frame: 1000000000
    min_live_cells: 250
    max_live_cells: 1000000000
    min_median_nearest_neighbor_px: -1000000000.0
    max_median_nearest_neighbor_px: 34.0
    note: Very dense late profile verified around frames 170-174.
