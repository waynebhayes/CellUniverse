# C. elegans density auto best candidate generated on 2026-06-14.
# Source file kept unchanged:
#   CONCENTRATED_SINGLE_FILE_DENSITY_SWITCH_CANDIDATE_NOT_RUN_VERIFIED_20260609.yaml
#
# Main change in this copy:
#   Add the early sparse 001-084 Cell Lumen v107 density-guarded no-miss profile and make it
#   the default runtime profile. The 085-171 verified profiles are preserved and
#   still selected by median nearest-neighbor density.
#
# Runtime profile selection:
#   f000-f084                  -> F001_084_cell_lumen_v107_density_guarded_no_miss
#   f085-f120 plus median NN   -> F085_120_temporal_repair_verified
#   f121-f170 plus median NN   -> F121_170_deterministic_split_verified
#   f170+ plus median NN       -> F170_174_late_baseline_verified
#
# Why frame guards are needed:
#   Sparse early daughter pairs can have a small local nearest-neighbor value
#   even when the whole embryo is still low density. Frame guards prevent those
#   local early splits from accidentally switching into the middle-stage profile.
#
# Safety note:
#   Ground truth is only for offline validation. This YAML never reads GT and
#   never uses GT coordinates to generate or repair runtime outputs.

