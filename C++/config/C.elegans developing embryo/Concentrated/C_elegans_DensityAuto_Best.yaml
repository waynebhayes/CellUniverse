    note: Kept in this file as a verified local repair reference, but not selected by automatic density switching.
  - profile: cell_lumen_high_recall_for_celluniverse_verified
    note: Kept in this file as a CellLumen reference profile, but not selected by automatic density switching.
  legacy_policy_reference:
  - if_median_nearest_neighbor_px: '>= 56.0'
    profile: F001_084_cell_lumen_v107_density_guarded_no_miss
  - if_median_nearest_neighbor_px: '>= 43.0 and < 56.0'
    profile: F085_120_temporal_repair_verified
  - if_median_nearest_neighbor_px: '>= 34.0 and < 43.0'
    profile: F121_170_deterministic_split_verified
  - if_median_nearest_neighbor_px: < 34.0
    profile: F170_174_late_baseline_verified
